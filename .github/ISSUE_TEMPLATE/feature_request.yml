name: 💡 Feature Request
description: Suggest an idea / Proposer une fonctionnalité
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        🇬🇧 Please describe your idea clearly.
        🇫🇷 Merci de décrire votre idée clairement.

  - type: textarea
    id: problem
    attributes:
      label: "Problem / Problème"
      description: |
        🇬🇧 What problem does this solve?
        🇫🇷 Quel problème cela résout-il ?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed solution / Solution proposée"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Additional context / Contexte supplémentaire"
    validations:
      required: false
