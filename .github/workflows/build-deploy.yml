name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Build Docker images and push to GHCR
  # ---------------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & push — app (PHP-FPM)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ghcr.io/marvinlerouge/summit-stats/app:${{ steps.meta.outputs.tag }}
            ghcr.io/marvinlerouge/summit-stats/app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — nginx (static assets baked in)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: nginx-prod
          push: true
          tags: |
            ghcr.io/marvinlerouge/summit-stats/nginx:${{ steps.meta.outputs.tag }}
            ghcr.io/marvinlerouge/summit-stats/nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 2 — Deploy to production server over SSH
  # ---------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      DEPLOY_PATH: /home/mlr/marvinlerouge.dev/summit-stats/compose

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DEPLOY_PATH: /home/mlr/marvinlerouge.dev/summit-stats/compose
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG,DEPLOY_PATH,GITHUB_SHA,GITHUB_REPOSITORY
          script_stop: true
          script: |
            set -Eeuo pipefail

            echo "==> Authenticate to GHCR"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            echo "==> Fetch docker-compose.prod.yml (commit: ${GITHUB_SHA})"
            curl -fsSL \
              "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/docker-compose.prod.yml" \
              -o "${DEPLOY_PATH}/docker-compose.prod.yml"

            cd "${DEPLOY_PATH}"

            echo "==> Pull images (tag: ${IMAGE_TAG})"
            IMAGE_TAG="${IMAGE_TAG}" docker compose -f docker-compose.prod.yml --env-file .env.prod pull

            echo "==> Redeploy stack"
            IMAGE_TAG="${IMAGE_TAG}" docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans

            echo "==> Run migrations"
            IMAGE_TAG="${IMAGE_TAG}" docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm app php artisan migrate --force

            echo "==> Stack status"
            docker compose -f docker-compose.prod.yml ps
