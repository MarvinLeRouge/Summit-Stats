name: CI

on:
  push:
    branches: [ main, v2 ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main, v2 ]
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, mbstring, sqlite3, pgsql, pdo_pgsql, redis, pcov
          coverage: pcov

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Copy .env
        run: cp .env.example .env

      - name: Disable elevation enrichment for CI
        run: echo "ELEVATION_ENABLED=false" >> .env
        
      - name: Generate app key
        run: php artisan key:generate

      - name: Lint PHP
        run: vendor/bin/pint --test

      - name: Lint JS
        run: npm run lint

      - name: Run tests with coverage
        run: php artisan test --coverage --min=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false
          use_oidc: true

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test:coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-frontend/lcov.info
          flags: frontend
          fail_ci_if_error: false
          use_oidc: true