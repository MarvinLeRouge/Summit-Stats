name: CI

on:
  push:
    branches: [ main, v2 ]
  pull_request:
    branches: [ main, v2 ]

jobs:
  tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, mbstring, sqlite3, pgsql, pdo_pgsql, redis, pcov
          coverage: pcov

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Copy .env
        run: cp .env.example .env

      - name: Disable elevation enrichment for CI
        run: echo "ELEVATION_ENABLED=false" >> .env
        
      - name: Generate app key
        run: php artisan key:generate

      - name: Run tests with coverage
        run: php artisan test --coverage --min=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          use_oidc: true

      - name: Lint PHP
        run: vendor/bin/pint --test

      - name: Lint JS
        run: npm run lint

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build assets
        run: npm run build

      - name: Create .env for Docker Compose
        run: |
          cp .env.example .env
          echo "ELEVATION_ENABLED=false" >> .env
          echo "DB_PASSWORD=secret" >> .env
          echo "APP_USER_NAME=${{ secrets.APP_USER_NAME }}" >> .env
          echo "APP_USER_EMAIL=${{ secrets.APP_USER_EMAIL }}" >> .env
          echo "APP_USER_PASSWORD=${{ secrets.APP_USER_PASSWORD }}" >> .env

      - name: Start Docker stack
        run: docker compose up -d --build

      - name: Wait for the app to be ready
        run: |
          echo "Waiting for http://localhost:8081 ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/login > /dev/null 2>&1; then
              echo "App is ready after ${i}s"
              break
            fi
            sleep 2
          done

      - name: Run migrations and seed the test user
        run: |
          docker compose exec -T app php artisan migrate --force
          docker compose exec -T app php artisan db:seed --class=UserSeeder

      - name: Create a Sanctum test token
        run: |
          TOKEN=$(docker compose exec -T app php -r "
            require 'vendor/autoload.php';
            \$app = require 'bootstrap/app.php';
            \$app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();
            echo App\Models\User::first()->createToken('ci-e2e')->plainTextToken;
          ")
          echo "TEST_TOKEN=${TOKEN}" >> $GITHUB_ENV

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://localhost:8081

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test:coverage