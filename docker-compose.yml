services:
  app:
    build:
      context: .
      target: development
    restart: unless-stopped
    user: root   # simplifie les permissions sur les volumes bind-mount en dev
    volumes:
      - .:/app                              # source code en live
      - vendor_data:/app/vendor             # vendor isolé du bind-mount (from image)
      - storage_data:/app/storage           # storage persistant
      - bootstrap_cache:/app/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres      # override pour utiliser le réseau Docker interne
      DB_PORT: "5432"
      REDIS_HOST: redis

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - .:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"
    depends_on:
      - app

  vite:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --prefer-offline && npm run dev"
    volumes:
      - .:/app
      - node_modules_data:/app/node_modules
    ports:
      - "5174:5174"
    depends_on:
      - app

  queue:
    build:
      context: .
      target: development
    restart: unless-stopped
    user: root
    command: php artisan queue:work redis --sleep=3 --tries=3
    volumes:
      - .:/app
      - vendor_data:/app/vendor
      - storage_data:/app/storage
    depends_on:
      - app
      - redis
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_HOST: redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_DATABASE:-summit_stats}
      POSTGRES_USER: ${DB_USERNAME:-summit_stats}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5433:5432"   # 5433 sur le host pour éviter le conflit avec le PG système
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-summit_stats} -d ${DB_DATABASE:-summit_stats}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  storage_data:
  bootstrap_cache:
  vendor_data:
  node_modules_data:
