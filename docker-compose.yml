services:
  app:
    build:
      context: .
      target: development
    restart: unless-stopped
    user: root   # simplifie les permissions sur les volumes bind-mount en dev
    volumes:
      - .:/app                              # source code en live
      - vendor_data:/app/vendor             # vendor isolé du bind-mount (from image)
      - storage_data:/app/storage           # storage persistant
      - bootstrap_cache:/app/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres      # override pour utiliser le réseau Docker interne
      DB_PORT: "5432"
      REDIS_HOST: redis
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - .:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.summit-stats-dev.rule=Host(`summit-stats.marvinlerouge.local`)"
      - "traefik.http.routers.summit-stats-dev.entrypoints=web"
      - "traefik.http.services.summit-stats-dev.loadbalancer.server.port=80"
    networks:
      - traefik-public
      - internal

  vite:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --prefer-offline && npm run dev"
    volumes:
      - .:/app
      - node_modules_data:/app/node_modules
    ports:
      - "127.0.0.1:5174:5174"
    depends_on:
      - app
    networks:
      - internal

  queue:
    build:
      context: .
      target: development
    restart: unless-stopped
    user: root
    command: php artisan queue:work redis --sleep=3 --tries=3
    volumes:
      - .:/app
      - vendor_data:/app/vendor
      - storage_data:/app/storage
    depends_on:
      - app
      - redis
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_HOST: redis
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_DATABASE:-summit_stats}
      POSTGRES_USER: ${DB_USERNAME:-summit_stats}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "127.0.0.1:5433:5432"   # 5433 sur le host pour éviter le conflit avec le PG système
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-summit_stats} -d ${DB_DATABASE:-summit_stats}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  storage_data:
  bootstrap_cache:
  vendor_data:
  node_modules_data:

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge
