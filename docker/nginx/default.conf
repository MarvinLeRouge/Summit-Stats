# OSM tile proxy cache — stored on a persistent Docker volume
proxy_cache_path /var/cache/nginx/tiles
                 levels=1:2
                 keys_zone=osm_tiles:10m
                 max_size=1g
                 inactive=30d
                 use_temp_path=off;

server {
    listen 80;
    server_name _;
    root /app/public;
    index index.php;

    resolver 127.0.0.11 valid=60s;

    # OSM tile proxy — caches tiles server-side for recurring trail areas
    location /tiles/ {
        proxy_pass         https://tile.openstreetmap.org/;
        proxy_ssl_server_name on;

        proxy_cache            osm_tiles;
        proxy_cache_valid      200 30d;
        proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock       on;

        proxy_set_header Host       tile.openstreetmap.org;
        proxy_set_header User-Agent "SummitStats/1.0 tile-cache (personal use)";
        proxy_hide_header      X-Cache;

        add_header X-Tile-Cache $upstream_cache_status;
        access_log off;
    }

    # Static assets — long cache, served directly by nginx
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # All other requests → Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP requests → PHP-FPM (app container)
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Disable buffering for SSE (upload progress streaming)
        fastcgi_buffering off;
        fastcgi_read_timeout 300s;
    }

    # Deny access to sensitive files
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    client_max_body_size 50M;
}
